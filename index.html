<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeployLynx</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

html{scroll-behavior:smooth;}

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:#020617;
position:sticky;
top:0;
z-index:10;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

nav a:hover{color:#38bdf8}

/* HERO */

.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(-45deg,#0f172a,#1e293b,#020617,#0ea5e9);
background-size:400% 400%;
animation:gradient 12s ease infinite;
}

@keyframes gradient{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.hero h1{
font-size:80px;
color:#38bdf8;
}

.hero p{
font-size:24px;
color:#e2e8f0;
}

/* SECTIONS */

.section{
padding:80px 20px;
text-align:center;
}

/* PROJECT CARDS */

.projects{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
}

.card{
background:#1e293b;
padding:30px;
width:260px;
border-radius:12px;
transition:.4s;
}

.card:hover{
transform:translateY(-10px);
background:#38bdf8;
}

.card i{
font-size:40px;
margin-bottom:15px;
}

.card a{
text-decoration:none;
color:white;
font-size:18px;
}

/* DEVOPS TOOLS */

.tools img{
width:60px;
margin:20px;
transition:.3s;
}

.tools img:hover{
transform:scale(1.3);
}

/* GITHUB STATS */

.stats img{
width:350px;
margin:15px;
}

/* SOCIAL */

.social{
font-size:40px;
margin-top:20px;
}

.social a{
margin:15px;
color:white;
}

.social a:hover{color:#38bdf8}

/* FOOTER */

footer{
background:#020617;
padding:25px;
text-align:center;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav>

<div><strong>DeployLynx</strong></div>

<div>
<a href="#projects">Projects</a>
<a href="#tools">Tools</a>
<a href="#stats">Stats</a>
<a href="#connect">Connect</a>
</div>

</nav>

<!-- HERO -->

<div class="hero">

<h1>DeployLynx</h1>

<p>DevOps • Cloud • Automation</p>

</div>

<!-- PROJECTS -->

<div class="section" id="projects">

<h2>Projects</h2>

<div class="projects">

<div class="card">
<i class="fa-solid fa-code"></i>
<a href="https://github.com/Deploylynx-tech/deploylynx-devsecops-pipeline" target="_blank">
DevSecOps Pipeline
</a>
</div>

<div class="card">
<i class="fa-solid fa-cloud"></i>
<a href="https://github.com/Deploylynx-tech/deploylynx-infrastructure" target="_blank">
Terraform Infrastructure
</a>
</div>

<div class="card">
<i class="fa-solid fa-chart-line"></i>
<a href="https://github.com/Deploylynx-tech/deploylynx-monitoring" target="_blank">
Monitoring Stack
</a>
</div>

<div class="card">
<i class="fa-solid fa-robot"></i>
<a href="https://github.com/Deploylynx-tech/ai-automation-tools" target="_blank">
AI Automation Tools
</a>
</div>

</div>

</div>

<!-- DEVOPS TOOLS -->

<div class="section" id="tools">

<h2>DevOps Tools</h2>

<div class="tools">

<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/docker/docker-original.svg">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/kubernetes/kubernetes-plain.svg">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/terraform/terraform-original.svg">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/jenkins/jenkins-original.svg">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/linux/linux-original.svg">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg">

</div>

</div>

<!-- GITHUB STATS -->

<div class="section" id="stats">

<div class="stats">

<img src="https://github-readme-stats.vercel.app/api?username=Deploylynx-tech&show_icons=true&theme=tokyonight">

</a>

<a href="mailto:deploylynx@email.com">

</a>

</div>

</div>

<footer>

<p>© 2026 DeployLynx | DevOps • Cloud • Automation</p>

</footer>

</body>

</html>
