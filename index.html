<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>DeployLynx</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#020617,#0f172a);
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:#020617;
position:sticky;
top:0;
z-index:10;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
font-size:16px;
}

nav a:hover{
color:#38bdf8;
}

/* HERO */

.hero{
text-align:center;
padding:120px 20px;
}

.hero h1{
font-size:75px;
color:#38bdf8;
}

.hero p{
font-size:24px;
color:#cbd5f5;
}

/* SECTION */

.section{
padding:80px 20px;
text-align:center;
}

/* PROJECTS */

.projects{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
}

.card{
background:#1e293b;
padding:30px;
width:260px;
border-radius:12px;
transition:0.4s;
}

.card:hover{
transform:translateY(-12px);
background:#38bdf8;
}

.card i{
font-size:40px;
margin-bottom:15px;
}

.card a{
color:white;
text-decoration:none;
font-size:18px;
}

/* DEVOPS TOOLS */

.tools{
font-size:55px;
margin-top:30px;
}

.tools i{
margin:20px;
transition:0.3s;
}

.tools i:hover{
color:#38bdf8;
transform:scale(1.3);
}

/* HEATMAP */

.heatmap img{
width:90%;
max-width:800px;
margin-top:30px;
}

/* SOCIAL */

.social{
font-size:45px;
margin-top:30px;
}

.social a{
margin:15px;
color:white;
}

.social a:hover{
color:#38bdf8;
}

/* FOOTER */

footer{
background:#020617;
text-align:center;
padding:30px;
margin-top:40px;
}

</style>

</head>

<body>

<nav>

<div><strong>DeployLynx</strong></div>

<div>

<a href="#projects">Projects</a>
<a href="#tools">Tools</a>
<a href="#activity">Activity</a>
<a href="#connect">Connect</a>

</div>

</nav>

<div class="hero">

<h1>DeployLynx</h1>

<p>DevOps • Cloud • Automation</p>

</div>

<!-- PROJECTS -->

<div class="section" id="projects">

<h2>Projects</h2>

<div class="projects">

<div class="card">
<i class="fa-solid fa-code"></i>
<a href="https://github.com/Deploylynx-tech/deploylynx-devsecops-pipeline" target="_blank">
DevSecOps Pipeline
</a>
</div>

<div class="card">
<i class="fa-solid fa-cloud"></i>
<a href="https://github.com/Deploylynx-tech/deploylynx-infrastructure" target="_blank">
Terraform Infrastructure
</a>
</div>

<div class="card">
<i class="fa-solid fa-chart-line"></i>
<a href="https://github.com/Deploylynx-tech/deploylynx-monitoring" target="_blank">
Monitoring Stack
</a>
</div>

<div class="card">
<i class="fa-solid fa-robot"></i>
<a href="https://github.com/Deploylynx-tech/ai-automation-tools" target="_blank">
AI Automation Tools
</a>
</div>

</div>

</div>

<!-- DEVOPS TOOLS -->

<div class="section" id="tools">

<h2>DevOps Tools</h2>

<div class="tools">

<i class="fa-brands fa-docker"></i>
<i class="fa-brands fa-aws"></i>
<i class="fa-brands fa-linux"></i>
<i class="fa-brands fa-github"></i>
<i class="fa-brands fa-python"></i>

</div>

</div>

<!-- GITHUB ACTIVITY -->

<div class="section" id="activity">

<h2>GitHub Activity</h2>

<div class="heatmap">

<img src="https://ghchart.rshah.org/Deploylynx-tech" />

</div>

</div>

<!-- SOCIAL -->

<div class="section" id="connect">

<h2>Connect</h2>

<div class="social">

<a href="https://github.com/Deploylynx-tech" target="_blank">
<i class="fa-brands fa-github"></i>
</a>

<a href="https://www.linkedin.com/company/linkedin-deploylynx-devops/" target="_blank">
<i class="fa-brands fa-linkedin"></i>
</a>

<a href="https://www.instagram.com/deploylynx26/" target="_blank">
<i class="fa-brands fa-instagram"></i>
</a>

<a href="mailto:deploylynx@email.com">

</div>

</div>

<footer>

<p>© 2026 DeployLynx | DevOps • Cloud • Automation</p>

</footer>

</body>

</html>
